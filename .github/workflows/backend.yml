name: Build and deploy backend

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - '.dockerignore'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/message-hub-app
          tags: |
            type=sha,format=long,prefix=

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=message-hub-app
          cache-to: type=gha,scope=message-hub-app,mode=max

  write-env:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          repository: vibes-group/infra
          ref: master

      - uses: ./.github/actions/write-env
        with:
          app: message-hub
          deploy-host:    ${{ secrets.DEPLOY_HOST }}
          deploy-ssh-key: ${{ secrets.DEPLOY_SSH_KEY }}
          host-key:       ${{ secrets.DEPLOY_HOST_KEY }}
          env: |
            IMAGE_TAG=${{ needs.build.outputs.image_tag }}

  deploy:
    needs: [build, write-env]
    permissions:
      contents: read
    uses: vibes-group/infra/.github/workflows/deploy.yml@master
    with:
      app: message-hub
    secrets:
      DEPLOY_HOST:     ${{ secrets.DEPLOY_HOST }}
      DEPLOY_SSH_KEY:  ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_HOST_KEY: ${{ secrets.DEPLOY_HOST_KEY }}
